<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  >

  <title>JARVIS</title>

  <meta name="theme-color" content="#000307">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="JARVIS">
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <div id="app">

    <header class="top-bar">

      <div class="system-status">
        <span class="status-dot"></span>
        <span>JARVIS OS</span>
      </div>

      <div id="time">00:00</div>

    </header>

    <main class="presence">

      <button
        id="core"
        type="button"
        aria-label="Activate JARVIS"
        data-state="online"
      >

        <span class="ambient-glow"></span>

        <span class="ring ring-outer"></span>
        <span class="ring ring-middle"></span>
        <span class="ring ring-inner"></span>

        <span class="orbit orbit-one">
          <span class="particle"></span>
        </span>

        <span class="orbit orbit-two">
          <span class="particle"></span>
        </span>

        <span class="reactor">
          <span class="reactor-grid"></span>
          <span class="reactor-centre"></span>
        </span>

      </button>

      <div class="identity">JARVIS</div>

      <div class="state">ONLINE</div>

      <div class="instruction">
        TAP CORE TO ACTIVATE
      </div>
      
      <section id="command-panel" class="command-panel" hidden>

  <form id="command-form">

    <label for="command-input">
      COMMAND
    </label>

    <div class="command-entry">

      <input
        id="command-input"
        type="text"
        placeholder="Give JARVIS a task"
        autocomplete="off"
        enterkeyhint="done"
      >

      <button
        id="command-submit"
        type="submit"
        aria-label="Submit command"
      >
        ↑
      </button>

    </div>

  </form>

  <div id="task-result" class="task-result" hidden>

    <span class="task-label">
      CURRENT TASK
    </span>

    <strong id="task-text"></strong>

  </div>

</section>
    </main>

  </div>

  <script src="./app.js?v=5"></script>

</body>
</html>
