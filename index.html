<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>JARVIS OS</title>

<meta name="theme-color" content="#000307">

<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="./style.css?v=6">

</head>

<body>

<div id="app">

<header class="top-bar">

<div class="system-status">

<span class="status-dot"></span>

<span>JARVIS OS</span>

</div>

<div id="time"></div>

</header>

<main class="presence">

<button id="core">

<div class="ambient-glow"></div>

<div class="ring ring-outer"></div>

<div class="ring ring-middle"></div>

<div class="ring ring-inner"></div>

<div class="orbit orbit-one">
<div class="particle"></div>
</div>

<div class="orbit orbit-two">
<div class="particle"></div>
</div>

<div class="reactor">

<div class="reactor-grid"></div>

<div class="reactor-centre"></div>

</div>

</button>

<div class="identity">
JARVIS
</div>

<div class="state">
ONLINE
</div>

<div class="instruction">
TAP CORE TO ACTIVATE
</div>

</main>

<section
id="command-panel"
class="command-panel"
hidden>
<section id="decision-panel" class="decision-panel">

  <div class="decision-header">
    <span>JARVIS DECISION ENGINE</span>
    <span id="decision-status">READY</span>
  </div>

  <div class="decision-content">

    <span class="decision-label">
      NEXT TASK
    </span>

    <strong id="next-task">
      Awaiting task data
    </strong>

    <span id="decision-reason">
      JARVIS will select the highest-priority action.
    </span>

  </div>

</section>
<form id="command-form">

<label for="command-input">

COMMAND

</label>

<div class="command-entry">

<input

id="command-input"

type="text"

placeholder="Give JARVIS a task"

autocomplete="off"

enterkeyhint="done"

>

<button

id="command-submit"

type="submit"

aria-label="Submit command"

>

↑

</button>

</div>

</form>

<div
id="task-result"
class="task-result"
hidden>

<span class="task-label">

CURRENT TASK

</span>

<strong id="task-text">

TEST

</strong>

</div>

</section>

</div>

<script src="./app.js?v=8"></script>

</body>

</html>
